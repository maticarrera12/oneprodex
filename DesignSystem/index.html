<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Carré · World Cup 2026 Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050507; }
  body {
    font-family: "Geist", -apple-system, system-ui, sans-serif;
    color: #F5F5F7;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(190,242,100,0.06) 0%, transparent 60%),
      radial-gradient(40% 40% at 80% 80%, rgba(99,102,241,0.05) 0%, transparent 60%),
      #050507;
  }
  /* Hide scrollbars on iOS frame inner content */
  ::-webkit-scrollbar { display: none; }

  /* ── Animations ─────────────────────────────────────────── */
  @keyframes pulseRing {
    0%   { transform: scale(0.5); opacity: 0.7; }
    80%  { transform: scale(2.4); opacity: 0;   }
    100% { transform: scale(2.4); opacity: 0;   }
  }
  @keyframes flashRow {
    0%   { opacity: 0.9; }
    100% { opacity: 0;   }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes screenOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
  .screen-in  { animation: screenIn  .26s cubic-bezier(.4,0,.2,1) both; }
  .screen-out { animation: screenOut .18s cubic-bezier(.4,0,.2,1) both; }

  /* Scaler */
  #stage {
    transform-origin: center center;
    transition: transform .15s ease;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="root"></div>
</div>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- iOS frame -->
<script type="text/babel" src="ios-frame.jsx"></script>

<!-- Data + UI primitives -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/match.jsx"></script>
<script type="text/babel" src="screens/leaderboard.jsx"></script>
<script type="text/babel" src="screens/standings.jsx"></script>
<script type="text/babel" src="screens/bracket.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>

<!-- App shell -->
<script type="text/babel" src="app.jsx"></script>

<!-- Mount -->
<script type="text/babel">
function Frame() {
  return (
    <window.IOSDevice width={402} height={874} dark>
      <window.App />
    </window.IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Frame />);

// auto-scale to viewport
function scale() {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const w = window.innerWidth, h = window.innerHeight;
  const s = Math.min(w / 460, h / 940, 1);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', scale);
setTimeout(scale, 60);
setTimeout(scale, 300);
</script>

</body>
</html>
